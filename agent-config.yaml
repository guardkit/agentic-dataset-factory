domain: architect-agent

player:
  provider: local
  model: qwen36-workhorse
  endpoint: http://localhost:9000/v1
  temperature: 0.4

coach:
  provider: local
  model: qwen36-workhorse
  endpoint: http://localhost:9000/v1
  temperature: 0.3

generation:
  max_turns: 3
  llm_retry_attempts: 3
  llm_retry_backoff: 2.0
  llm_timeout: 300
  target_timeout: 600

chunking:
  chunk_size: 512
  overlap: 64

logging:
  level: DEBUG
  format: json
